#Tomact port
server.port=${SERVER_PORT:9090}
#mysql
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/wms?serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8&useSSL=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# jwt
security.jwt.secret=${JWT_SECRET:DormLinkJwtSecretKey-2023-Interview-Hardening-ChangeMe!}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# redis/cache
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.timeout=${REDIS_TIMEOUT:3000ms}
spring.cache.type=redis
spring.cache.redis.cache-null-values=false
